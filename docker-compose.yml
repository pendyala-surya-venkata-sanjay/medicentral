# MediCentral — Docker Desktop (run from repo root: docker compose up --build)
name: medicentral

services:
  mongo:
    image: mongo:7
    container_name: medicentral-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    container_name: medicentral-ml
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medicentral-api
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/medicentral
      ML_SERVICE_URL: http://ml-service:8000
      TRUST_PROXY: "true"
      ENABLE_SOCKET: "true"
      SEED_DEMO_DATA: "false"
      CORS_ORIGIN: http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 8s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: medicentral-web
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  backend_uploads:
